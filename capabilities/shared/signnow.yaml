naftiko: "1.0.0-alpha1"

info:
  label: "SignNow REST API"
  description: "The SignNow REST API enables developers to embed legally binding e-signature workflows. Supports document upload, template-based signing, signature invitations, bulk operations, user management, and webhooks."
  tags:
  - E-Signature
  - Documents
  - Templates
  - Signing
  - Workflow Automation
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SIGNNOW_ACCESS_TOKEN: SIGNNOW_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: signnow
      baseUri: https://api.signnow.com
      description: "SignNow REST API for e-signature workflows and document management."
      authentication:
        type: bearer
        token: "{{SIGNNOW_ACCESS_TOKEN}}"
      resources:
        - name: documents
          path: /document
          description: "Document upload and management operations."
          operations:
            - name: list-documents
              method: GET
              description: "List all documents for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: upload-document
              method: POST
              description: "Upload a PDF document for e-signature processing."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: document
          path: /document/{document_id}
          description: "Single document operations."
          operations:
            - name: get-document
              method: GET
              description: "Retrieve document details including fields, signers, and status."
              inputParameters:
                - name: document_id
                  in: path
                  type: string
                  required: true
                  description: "Unique document identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-document
              method: DELETE
              description: "Permanently delete a document."
              inputParameters:
                - name: document_id
                  in: path
                  type: string
                  required: true
                  description: "Unique document identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: document-download
          path: /document/{document_id}/download
          description: "Document download operations."
          operations:
            - name: download-document
              method: GET
              description: "Download a signed document as PDF."
              inputParameters:
                - name: document_id
                  in: path
                  type: string
                  required: true
                  description: "Unique document identifier."
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Download type: collapsed or with_history."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: signature-invite
          path: /document/{document_id}/invite
          description: "Signature invitation operations."
          operations:
            - name: send-signature-invite
              method: POST
              description: "Send a signature invitation to one or more recipients."
              inputParameters:
                - name: document_id
                  in: path
                  type: string
                  required: true
                  description: "Unique document identifier."
              body:
                type: json
                data:
                  from: "{{tools.from_email}}"
                  to: "{{tools.recipients}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: cancel-invite
          path: /document/{document_id}/fieldinvitecancel
          description: "Cancel signature invite operations."
          operations:
            - name: cancel-signature-invite
              method: PUT
              description: "Cancel all pending signature invitations for a document."
              inputParameters:
                - name: document_id
                  in: path
                  type: string
                  required: true
                  description: "Unique document identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: templates
          path: /template
          description: "Template management operations."
          operations:
            - name: list-templates
              method: GET
              description: "List all document templates."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-template
              method: POST
              description: "Create a new reusable document template."
              body:
                type: json
                data:
                  document_id: "{{tools.document_id}}"
                  document_name: "{{tools.document_name}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: template
          path: /template/{template_id}
          description: "Single template operations."
          operations:
            - name: get-template
              method: GET
              description: "Retrieve details of a specific document template."
              inputParameters:
                - name: template_id
                  in: path
                  type: string
                  required: true
                  description: "Unique template identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-template
              method: DELETE
              description: "Delete a document template."
              inputParameters:
                - name: template_id
                  in: path
                  type: string
                  required: true
                  description: "Unique template identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: bulk-invite
          path: /template/{template_id}/bulkinvite
          description: "Bulk invitation operations."
          operations:
            - name: send-bulk-invite
              method: POST
              description: "Send signature invitations to multiple recipients using CSV."
              inputParameters:
                - name: template_id
                  in: path
                  type: string
                  required: true
                  description: "Unique template identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /user
          description: "User management operations."
          operations:
            - name: create-user
              method: POST
              description: "Create a new SignNow user account."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  password: "{{tools.password}}"
                  first_name: "{{tools.first_name}}"
                  last_name: "{{tools.last_name}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: current-user
          path: /user/me
          description: "Current user profile operations."
          operations:
            - name: get-current-user
              method: GET
              description: "Retrieve the profile of the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: webhooks
          path: /api/events
          description: "Webhook subscription management."
          operations:
            - name: list-webhooks
              method: GET
              description: "List all registered webhook subscriptions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-webhook
              method: POST
              description: "Register a new webhook event subscription."
              body:
                type: json
                data:
                  event: "{{tools.event}}"
                  action: "{{tools.callback_url}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: envelopes
          path: /documentgroup
          description: "Document group envelope operations."
          operations:
            - name: list-envelopes
              method: GET
              description: "List all document group envelopes."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-envelope
              method: POST
              description: "Create a new document group envelope."
              body:
                type: json
                data:
                  document_ids: "{{tools.document_ids}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: signnow-rest
      resources:
        - path: /v1/documents
          name: documents
          description: "Document management endpoints."
          operations:
            - method: GET
              name: list-documents
              description: "List all documents."
            - method: POST
              name: upload-document
              description: "Upload a new document."
        - path: /v1/documents/{id}
          name: document
          description: "Single document operations."
          operations:
            - method: GET
              name: get-document
              description: "Get document by ID."
            - method: DELETE
              name: delete-document
              description: "Delete a document."
        - path: /v1/templates
          name: templates
          description: "Template management endpoints."
          operations:
            - method: GET
              name: list-templates
              description: "List all templates."
            - method: POST
              name: create-template
              description: "Create a new template."

    - type: mcp
      port: 9100
      namespace: signnow-mcp
      transport: http
      tools:
        - name: list-documents
          description: "List all e-signature documents."
          hints:
            readOnly: true
          call: "signnow.list-documents"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-document
          description: "Retrieve details for a specific document."
          hints:
            readOnly: true
          call: "signnow.get-document"
          with:
            document_id: "tools.document_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: upload-document
          description: "Upload a PDF document for signing."
          call: "signnow.upload-document"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-signature-invite
          description: "Send signature invitations to recipients."
          call: "signnow.send-signature-invite"
          with:
            document_id: "tools.document_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-templates
          description: "List all document templates."
          hints:
            readOnly: true
          call: "signnow.list-templates"
          outputParameters:
            - type: array
              mapping: "$."
