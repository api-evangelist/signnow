naftiko: 1.0.0-alpha2
info:
  label: SignNow REST API — Authentication
  description: 'SignNow REST API — Authentication. 1 operations. Lead operation: Create OAuth Token. Self-contained Naftiko
    capability covering one Signnow business surface.'
  tags:
  - Signnow
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIGNNOW_API_KEY: SIGNNOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: signnow-authentication
    baseUri: https://api.signnow.com
    description: SignNow REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: oauth2-token
      path: /oauth2/token
      operations:
      - name: createoauthtoken
        method: POST
        description: Create OAuth Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SIGNNOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: signnow-authentication-rest
    port: 8080
    description: REST adapter for SignNow REST API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/oauth2/token
      name: oauth2-token
      description: REST surface for oauth2-token.
      operations:
      - method: POST
        name: createoauthtoken
        description: Create OAuth Token
        call: signnow-authentication.createoauthtoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: signnow-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for SignNow REST API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-oauth-token
      description: Create OAuth Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: signnow-authentication.createoauthtoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
