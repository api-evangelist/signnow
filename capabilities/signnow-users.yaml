naftiko: 1.0.0-alpha2
info:
  label: SignNow REST API — Users
  description: 'SignNow REST API — Users. 3 operations. Lead operation: Create User. Self-contained Naftiko capability covering
    one Signnow business surface.'
  tags:
  - Signnow
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIGNNOW_API_KEY: SIGNNOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: signnow-users
    baseUri: https://api.signnow.com
    description: SignNow REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: createuser
        method: POST
        description: Create User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: user-me
      path: /user/me
      operations:
      - name: getcurrentuser
        method: GET
        description: Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-user_id
      path: /user/{user_id}
      operations:
      - name: getuser
        method: GET
        description: Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: Unique user identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.SIGNNOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: signnow-users-rest
    port: 8080
    description: REST adapter for SignNow REST API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: POST
        name: createuser
        description: Create User
        call: signnow-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/me
      name: user-me
      description: REST surface for user-me.
      operations:
      - method: GET
        name: getcurrentuser
        description: Get Current User
        call: signnow-users.getcurrentuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/{user-id}
      name: user-user-id
      description: REST surface for user-user_id.
      operations:
      - method: GET
        name: getuser
        description: Get User
        call: signnow-users.getuser
        with:
          user_id: rest.user_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: signnow-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for SignNow REST API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-user
      description: Create User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: signnow-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-current-user
      description: Get Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signnow-users.getcurrentuser
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signnow-users.getuser
      with:
        user_id: tools.user_id
      outputParameters:
      - type: object
        mapping: $.
