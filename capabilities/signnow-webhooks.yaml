naftiko: 1.0.0-alpha2
info:
  label: SignNow REST API — Webhooks
  description: 'SignNow REST API — Webhooks. 3 operations. Lead operation: List Webhooks. Self-contained Naftiko capability
    covering one Signnow business surface.'
  tags:
  - Signnow
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIGNNOW_API_KEY: SIGNNOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: signnow-webhooks
    baseUri: https://api.signnow.com
    description: SignNow REST API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: api-events
      path: /api/events
      operations:
      - name: listwebhooks
        method: GET
        description: List Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createwebhook
        method: POST
        description: Create Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-events-webhook_id
      path: /api/events/{webhook_id}
      operations:
      - name: deletewebhook
        method: DELETE
        description: Delete Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhook_id
          in: path
          type: string
          description: Unique webhook identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.SIGNNOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: signnow-webhooks-rest
    port: 8080
    description: REST adapter for SignNow REST API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/events
      name: api-events
      description: REST surface for api-events.
      operations:
      - method: GET
        name: listwebhooks
        description: List Webhooks
        call: signnow-webhooks.listwebhooks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwebhook
        description: Create Webhook
        call: signnow-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/events/{webhook-id}
      name: api-events-webhook-id
      description: REST surface for api-events-webhook_id.
      operations:
      - method: DELETE
        name: deletewebhook
        description: Delete Webhook
        call: signnow-webhooks.deletewebhook
        with:
          webhook_id: rest.webhook_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: signnow-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for SignNow REST API — Webhooks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-webhooks
      description: List Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signnow-webhooks.listwebhooks
      outputParameters:
      - type: object
        mapping: $.
    - name: create-webhook
      description: Create Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: signnow-webhooks.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete Webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: signnow-webhooks.deletewebhook
      with:
        webhook_id: tools.webhook_id
      outputParameters:
      - type: object
        mapping: $.
